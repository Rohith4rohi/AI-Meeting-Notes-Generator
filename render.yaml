services:
  # Backend Web Service
  - type: web
    name: ai-meeting-notes-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false # You MUST add this in the Render dashboard manually
      - key: OPENAI_API_KEY
        sync: false # You MUST add this in the Render dashboard manually
      - key: FRONTEND_URL
        fromService:
          type: web
          name: ai-meeting-notes-web
          envVarKey: RENDER_EXTERNAL_URL

  # Frontend Static Site
  - type: web
    name: ai-meeting-notes-web
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: ai-meeting-notes-api
          envVarKey: RENDER_EXTERNAL_URL
